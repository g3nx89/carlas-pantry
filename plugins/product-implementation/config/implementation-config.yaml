# Implementation Skill Configuration (v4)
# User-facing settings only. Operational constants are hardcoded in reference files.
# Profile definitions: config/profile-definitions.yaml (internal, not user-edited).

# Quality profile — bundles feature flags, autonomy, and CLI options.
# null = ask user at startup. In ralph mode, uses ralph.default_profile.
profile: null    # "quick" | "standard" | "thorough" | null

# Autonomy — how the system handles findings and failures.
# null = use profile default (quick→auto, standard/thorough→interactive).
# In ralph mode, always overridden to "auto".
autonomy: null   # "auto" | "interactive" | null

# Project-specific overrides (auto-detected if null)
project:
  build_command: null     # e.g., "./gradlew assembleDebug" — null = auto-detect from project files
  test_command: null      # e.g., "./gradlew testDebugUnitTest" — null = auto-detect
  package_name: null      # e.g., "com.example.app" — null = extract from plan.md applicationId

# Figma integration — design parity verification
figma:
  file_key: null          # Figma file key from URL: figma.com/file/<KEY>/... — null = skip Figma refs export
  page_name: null         # Page to export from — null = all pages
  parity_threshold: 0.85  # Minimum figma_check_design_parity score to pass

# CLI (external model) overrides
cli:
  codex_model: null       # e.g., "o3", "gpt-5.4" — null = codex default
  codex_effort: null      # "low" | "medium" | "high" — null = "medium"

# Ralph loop (autonomous execution)
ralph:
  default_profile: "standard"   # Profile used when ralph mode auto-resolves null profile

# Severity classification (canonical definitions — referenced by all stages)
severity:
  critical:
    description: "Breaks functionality, security vulnerability, data loss risk"
  high:
    description: "Likely to cause bugs, significant code quality issue"
  medium:
    description: "Code smell, maintainability concern, minor pattern violation"
  low:
    description: "Style preference, minor optimization opportunity"
  escalation_triggers:
    - "User-visible data corruption or data loss"
    - "Implicit ordering dependency that silently produces wrong results"
    - "UI state contradiction (displayed state differs from actual state)"
    - "Singleton or shared-state leak across scopes"
    - "Race condition with user-visible effect"

# Specify Skill Configuration (v3)
# ==================================
# User-facing configuration. Keep this file small.
# Profile definitions: config/specify-profile-definitions.yaml (internal).
#
# Referenced by:
# - $CLAUDE_PLUGIN_ROOT/skills/specify/SKILL.md
# - $CLAUDE_PLUGIN_ROOT/skills/specify/references/stage-1-setup.md

---

# Profile: controls which features are enabled and quality thresholds.
# "rapid" | "standard" | "thorough" | null (ask at startup)
profile: null

# File-based clarification configuration
clarification:
  mode: "file_based"
  questions_file: "clarification-questions.md"
  auto_resolve:
    enabled: true
    confidence_required: "high"
    sources: ["input_documents", "prior_decisions", "spec_content"]
    registry_file: "clarification-report.md"
    notify_user: true

# CLI dispatch via ntm (Named Tmux Manager)
# Prerequisite: brew install dicklesworthstone/tap/ntm
cli_dispatch:
  tool: "ntm"
  script_path: "scripts/dispatch-via-ntm.sh"
  cli_clients_dir: "config/cli_clients"
